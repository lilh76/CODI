env: sc2_v2

env_args:
  # key: "sc2_v2"
  continuing_episode: False
  difficulty: "7"
  game_version: null
  map_name: "10gen_zerg"
  move_amount: 2
  obs_all_health: True
  obs_instead_of_state: False
  obs_last_action: False
  obs_own_health: True
  obs_pathing_grid: False
  obs_terrain_height: False
  obs_timestep_number: False
  reward_death_value: 10
  reward_defeat: 0
  reward_negative_scale: 0.5
  reward_only_positive: True
  reward_scale: True
  reward_scale_rate: 20
  reward_sparse: False
  reward_win: 200
  replay_dir: ""
  replay_prefix: ""
  conic_fov: False
  obs_own_pos: True
  use_unit_ranges: True
  min_attack_range: 2
  num_fov_actions: 12

  # capability_config:
  #   n_units: 2
  #   n_enemies: 4
  #   team_gen:
  #     dist_type: "weighted_teams"
  #     unit_types: 
  #       - "marine"
  #       - "marauder"
  #       - "medivac"
  #     weights:
  #       - 1.0
  #       - 0.0
  #       - 0.0
  #     exception_unit_types:
  #       - "medivac"
  #     observe: True

  #   start_positions:
  #     dist_type: "surrounded"
  #     # dist_type: "surrounded_and_reflect"
  #     # p: 0.5
  #     map_x: 32
  #     map_y: 32
  #   # enemy_mask:
  #   #   dist_type: "mask"
  #   #   mask_probability: 0.5
  #   #   n_enemies: 5

  capability_config:
    n_units: 3
    n_enemies: 4
    team_gen:
      dist_type: "weighted_teams"
      unit_types: 
        - "zergling"
        - "baneling"
        - "hydralisk"
      weights:
        - 1.0
        - 0.0
        - 0.0
      exception_unit_types:
        - "baneling"
      observe: True

    start_positions:
      dist_type: "surrounded_and_reflect"
      p: 0.5
      map_x: 32
      map_y: 32

  state_last_action: True
  state_timestep_number: False
  step_mul: 8
  heuristic_ai: False
  # heuristic_rest: False
  debug: False
  prob_obs_enemy: 1.0
  action_mask: True

test_greedy: True
test_nepisode: 32
test_interval: 10000
log_interval: 10000
runner_log_interval: 10000
learner_log_interval: 10000
t_max: 2050000

# offline collection config
num_episodes_collected: 4000
offline_data_quality: "medium"
offline_data_folder: "dataset"
save_replay_buffer: True
stop_winrate: 0.0
stop_return: 0
max_size: 2000