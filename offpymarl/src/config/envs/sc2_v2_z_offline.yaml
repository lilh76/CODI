env: sc2_v2

env_args:
  # key: "sc2_v2"
  continuing_episode: False
  difficulty: "7"
  game_version: null
  map_name: "10gen_zerg"
  move_amount: 2
  obs_all_health: True
  obs_instead_of_state: False
  obs_last_action: False
  obs_own_health: True
  obs_pathing_grid: False
  obs_terrain_height: False
  obs_timestep_number: False
  reward_death_value: 10
  reward_defeat: 0
  reward_negative_scale: 0.5
  reward_only_positive: True
  reward_scale: True
  reward_scale_rate: 20
  reward_sparse: False
  reward_win: 200
  replay_dir: ""
  replay_prefix: ""
  conic_fov: False
  obs_own_pos: True
  use_unit_ranges: True
  min_attack_range: 2
  num_fov_actions: 12
  capability_config:
    n_units: 3
    n_enemies: 4
    team_gen:
      dist_type: "weighted_teams"
      unit_types: 
        - "zergling"
        - "baneling"
        - "hydralisk"
      weights:
        - 1.0
        - 0.0
        - 0.0
      exception_unit_types:
        - "baneling"
      observe: True

    start_positions:
      dist_type: "surrounded"
      p: 0.5
      map_x: 32
      map_y: 32

  state_last_action: True
  state_timestep_number: False
  step_mul: 8
  heuristic_ai: False
  # heuristic_rest: False
  debug: False
  prob_obs_enemy: 1.0
  action_mask: True

test_greedy: True
test_nepisode: 32
test_interval: 500
log_interval: 500
runner_log_interval: 500
learner_log_interval: 500
save_model_interval: 10000
t_max: 20000

# offline dataset, used only for single-task offline
offline_data_folder: "dataset"
offline_bottom_data_path: ""
offline_data_quality: "expert"
# offline_max_buffer_size: 4000
offline_max_buffer_size: 20000
offline_data_shuffle: False
offline_data_type: "h5"


max_return: 20
# min_return: 0